<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Name Generator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" title="Переключить тему">
        <svg class="theme-icon theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <main class="container">
        <h1>🎯 Branch Name Generator</h1>

        <form id="branchForm" aria-label="Форма генерации названия ветки">
            <section class="section" aria-labelledby="branch-type-label">
                <div class="form-group">
                    <label id="branch-type-label">Тип ветки:</label>
                    <div class="radio-group-wrapper">
                        <div class="radio-group" role="radiogroup">
                            <div class="radio-item">
                                <input type="radio" id="feature" name="branchType" value="feature" checked aria-describedby="taskIdHint">
                                <label for="feature">feature</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="fix" name="branchType" value="fix">
                                <label for="fix">fix</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="hotfix" name="branchType" value="hotfix">
                                <label for="hotfix">hotfix</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="taskId">ID задачи:</label>
                    <input type="text" id="taskId" name="taskId" placeholder="ABC-1234 или https://site.com/ABC-1234" aria-describedby="taskIdError taskIdHint" aria-invalid="false" autocomplete="off" required>
                    <div class="error-message" id="taskIdError" role="alert" aria-live="polite"></div>
                    <div class="hint" id="taskIdHint">Можно вставить ID задачи или ссылку на задачу</div>
                </div>
            </section>

            <section class="section" aria-labelledby="branch-name-label">
                <div class="form-group">
                    <label for="branchName" id="branch-name-label">Название ветки:</label>
                    <input type="text" id="branchName" name="branchName" placeholder="Введите название ветки..." aria-describedby="branchNameError" aria-invalid="false" autocomplete="off" required pattern="[a-zA-Z0-9\s-]+" title="Только латинские буквы, цифры, пробелы и дефисы">
                    <div class="error-message" id="branchNameError" role="alert" aria-live="polite"></div>
                </div>
            </section>

            <div class="button-wrapper">
                <button type="submit">✨ Сгенерировать</button>
            </div>
        </form>

        <section class="result-container" id="resultContainer" aria-labelledby="result-label">
            <div class="result-label" id="result-label">Результат:</div>
            <div class="result-value">
                <input type="text" class="result-input" id="resultInput" disabled aria-label="Сгенерированное название ветки" aria-describedby="lengthInfo">
                <button type="button" class="copy-btn" id="copyBtn" disabled aria-label="Копировать название ветки в буфер обмена">Копировать</button>
            </div>
            <div class="length-info" id="lengthInfo" aria-live="polite"></div>
        </section>
    </main>

    <script>
        (function() {
            try {
                const THEME_STORAGE_KEY = 'theme';
                const DEFAULT_THEME = 'light';
                const savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || DEFAULT_THEME;
                document.documentElement.className = 'theme-' + savedTheme;
            } catch (e) {
                document.documentElement.className = 'theme-light';
            }
        })();
    </script>
    <script src="js/functions.js"></script>
</body>

</html>
